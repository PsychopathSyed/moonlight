name: Run Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        id: lint
        continue-on-error: true
        run: |
          if grep -q '"lint"' package.json; then
            npm run lint
          else
            echo "::warning::No lint script found - skipping"
          fi

      - name: Run tests (if available)
        id: test
        continue-on-error: true
        run: |
          if grep -q '"test"' package.json; then
            npm test -- --coverage --watchAll=false
          else
            echo "::warning::No tests found - skipping"
          fi

      - name: Upload coverage reports (if generated)
        if: steps.test.outcome == 'success'
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run lint (if available)
        id: lint
        continue-on-error: true
        run: |
          cd backend
          if [ -f .flake8 ] || [ -f pyproject.toml ]; then
            flake8 . || true
          else
            echo "::warning::No lint config found - skipping"
          fi

      - name: Run tests (if available)
        id: test
        continue-on-error: true
        run: |
          cd backend
          if [ -f pytest.ini ] || [ -f setup.py ] || grep -q "pytest" requirements.txt; then
            pytest tests/ -v --cov=. --cov-report=xml || true
          else
            echo "::warning::No tests found - skipping"
          fi

      - name: Upload coverage reports (if generated)
        if: steps.test.outcome == 'success'
        uses: codecov/codecov-action@v3
        with:
          files: backend/coverage.xml
          flags: backend
          name: backend-coverage
